<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>涉路工程管理 v3.0</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- [新增] RemixIcon (更精致的图标库) -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    
    <!-- Excel & ECharts -->
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    
    <!-- 地图配置 (保留你的 Key) -->
    <script type="text/javascript">
        window._AMapSecurityConfig = { securityJsCode: 'YOUR_AMAP_KEY_SECURITY_CODE' }
    </script>
    <script type="text/javascript" src="https://webapi.amap.com/maps?v=2.0&key=YOUR_AMAP_KEY"></script> 
</head>
<body>

<div class="d-flex h-100">
    <!-- ================= 左侧侧边栏 ================= -->
    <div class="sidebar d-flex flex-column flex-shrink-0 p-3 shadow">
        <a href="#" class="d-flex align-items-center mb-3 mb-md-0 me-md-auto text-decoration-none brand-logo">
            <i class="ri-roadster-line fs-2 me-2 text-primary"></i>
            <div style="text-align: center;">
                <div class="fs-5 fw-bold text-primary">高速公路</div>
                <div class="fs-5 fw-bold text-primary">涉路工程管理</div>
            </div>
        </a>
        <hr>
        <ul class="nav nav-pills flex-column mb-auto">
            <li class="nav-item">
                <a href="#map" class="nav-link active" data-view="map">
                    <i class="ri-map-pin-line me-2"></i>地图总览
                </a>
            </li>
            <li>
                <a href="#entry" class="nav-link" data-view="entry">
                    <i class="ri-edit-box-line me-2"></i>数据录入
                </a>
            </li>
            <li>
                <a href="#stats" class="nav-link" data-view="stats">
                    <i class="ri-pie-chart-2-line me-2"></i>统计分析
                </a>
            </li>
        </ul>
        
        <!-- [调整] 深色模式按钮移到底部 -->
        <div class="mt-auto">
            <div class="d-flex align-items-center p-2 rounded bg-light-subtle">
                <i class="ri-moon-line me-2"></i>
                <div class="form-check form-switch m-0">
                    <input class="form-check-input" type="checkbox" id="themeToggle">
                    <label class="form-check-label small" for="themeToggle">深色模式</label>
                </div>
            </div>
            <hr>
            <div class="footer-info small text-muted text-center">
                v3.0.0 Alpha<br>
                Made with 🍵 and AI by LiYuan &copy; 2025/12
            </div>
        </div>
    </div>

    <!-- ================= 右侧内容区 ================= -->
    <div class="content-area flex-grow-1 position-relative">
        
        <!-- 1. 地图视图 -->
        <div id="view-map" class="view-section h-100">
            <div id="amap-container"></div>
            <!-- HUD -->
            <div class="map-hud shadow">
                <div class="hud-item border-end">
                    <span class="hud-label">全量项目</span>
                    <span class="hud-value" id="hud-total">0</span>
                </div>
                <div class="hud-item border-end">
                    <span class="hud-label text-info">申请中</span>
                    <span class="hud-value" id="hud-planning">0</span>
                </div>
                <div class="hud-item border-end">
                    <span class="hud-label text-danger">施工中</span>
                    <span class="hud-value" id="hud-construction">0</span>
                </div>
                <div class="hud-item">
                    <span class="hud-label text-success">已完工</span>
                    <span class="hud-value" id="hud-completed">0</span>
                </div>
            </div>
        </div>

        <!-- 2. 数据录入视图 -->
        <div id="view-entry" class="view-section h-100 p-4" style="display: none; overflow-y: auto;">
            <div class="container-fluid" style="max-width: 1000px;">
                <h3 class="mb-4 d-flex align-items-center">
                    <i class="ri-add-circle-line me-2 text-primary"></i>新增/编辑工程
                </h3>
                <div class="card shadow border-0">
                    <div class="card-body p-4">
                        <form id="projectForm">
                            <input type="hidden" name="id" id="edit-id">
                            <div class="row g-3">
                                <!-- 表单内容保持不变，仅优化图标 -->
                                <div class="col-md-6">
                                    <label class="form-label">项目名称 <span class="text-danger">*</span></label>
                                    <input type="text" class="form-control" name="name" required>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">工程类型</label>
                                    <select class="form-select" name="type">
                                        <option value="bridge">桥梁维修</option>
                                        <option value="tunnel">隧道养护</option>
                                        <option value="advertisement">非标广告牌</option>
                                        <option value="pipe">管线施工</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">申请单位</label>
                                    <input type="text" class="form-control" name="applicant">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">当前状态</label>
                                    <select class="form-select" name="status">
                                        <option value="planning">申请中</option>
                                        <option value="construction">施工中</option>
                                        <option value="completed">已完工</option>
                                    </select>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">审批时间</label>
                                    <input type="date" class="form-control" name="approval_date">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">完工时间</label>
                                    <input type="date" class="form-control" name="completion_date">
                                </div>
                                <div class="col-12">
                                    <label class="form-label text-primary">
                                        <i class="ri-map-pin-2-line"></i> 地理坐标 (点击地图选择)
                                    </label>
                                    <div class="input-group">
                                        <span class="input-group-text">经度</span>
                                        <input type="text" class="form-control" name="longitude" id="input-lng" readonly required>
                                        <span class="input-group-text">纬度</span>
                                        <input type="text" class="form-control" name="latitude" id="input-lat" readonly required>
                                        <button type="button" class="btn btn-outline-secondary" onclick="app.clearPicker()">清除</button>
                                    </div>
                                    <div id="picker-map" class="mt-2 rounded"></div>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">桩号</label>
                                    <input type="text" class="form-control" name="stake_number" placeholder="K000+000">
                                </div>
                                <div class="col-12">
                                    <label class="form-label">现场照片 (追加)</label>
                                    <input type="file" class="form-control" name="files" multiple accept="image/*,video/*">
                                </div>
                                <div class="col-12" id="old-media-area" style="display:none;">
                                    <label class="form-label">已存图片 (点击删除)</label>
                                    <div id="media-list" class="d-flex flex-wrap gap-2"></div>
                                </div>
                                <div class="col-12">
                                    <label class="form-label">描述</label>
                                    <textarea class="form-control" name="description" rows="3"></textarea>
                                </div>
                                <div class="col-12 d-flex gap-2">
                                    <button type="submit" class="btn btn-primary flex-grow-1">保存提交</button>
                                    <button type="button" class="btn btn-secondary" onclick="app.resetForm()">重置</button>
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <!-- 3. 统计视图 -->
        <div id="view-stats" class="view-section h-100 p-4" style="display: none; overflow-y: auto;">
            <div class="container-fluid" style="max-width: 1400px;">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h3><i class="ri-bar-chart-grouped-line me-2"></i>数据驾驶舱</h3>
                    <button class="btn btn-success" onclick="app.exportToExcel()">
                        <i class="ri-file-excel-2-line me-2"></i>导出 Excel
                    </button>
                </div>

                <!-- 顶部指标卡 -->
                <div class="row g-3 mb-4">
                    <div class="col-md-3">
                        <div class="card stat-card border-0 shadow-sm text-primary">
                            <div class="card-body">
                                <h6 class="text-muted text-uppercase mb-2">项目总数</h6>
                                <div class="d-flex align-items-center">
                                    <i class="ri-folder-open-line fs-1 me-3"></i>
                                    <span class="fs-2 fw-bold" id="stat-total">0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card border-0 shadow-sm text-danger">
                            <div class="card-body">
                                <h6 class="text-muted text-uppercase mb-2">正在施工</h6>
                                <div class="d-flex align-items-center">
                                    <i class="ri-barricade-line fs-1 me-3"></i>
                                    <span class="fs-2 fw-bold" id="stat-working">0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card border-0 shadow-sm text-success">
                            <div class="card-body">
                                <h6 class="text-muted text-uppercase mb-2">本月新增</h6>
                                <div class="d-flex align-items-center">
                                    <i class="ri-line-chart-line fs-1 me-3"></i>
                                    <span class="fs-2 fw-bold" id="stat-new">0</span>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md-3">
                        <div class="card stat-card border-0 shadow-sm text-info">
                            <div class="card-body">
                                <h6 class="text-muted text-uppercase mb-2">完工归档</h6>
                                <div class="d-flex align-items-center">
                                    <i class="ri-checkbox-circle-line fs-1 me-3"></i>
                                    <span class="fs-2 fw-bold" id="stat-done">--</span>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- 中部图表区 -->
                <div class="row g-4 mb-4">
                    <div class="col-md-4">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-header bg-transparent fw-bold py-3">工程类型分布</div>
                            <div class="card-body"><div id="chartType"></div></div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-header bg-transparent fw-bold py-3">工程状态占比</div>
                            <div class="card-body"><div id="chartStatus"></div></div>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="card shadow-sm border-0 h-100">
                            <div class="card-header bg-transparent fw-bold py-3">年度申请趋势</div>
                            <div class="card-body"><div id="chartTrend"></div></div>
                        </div>
                    </div>
                </div>

                <!-- 底部数据表格 -->
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-transparent fw-bold py-3">项目明细列表 (Excel 预览)</div>
                    <div class="card-body p-0">
                        <div class="table-responsive" style="max-height: 400px;">
                            <table class="table table-hover table-striped mb-0" id="stats-table">
                                <thead class="table-light sticky-top">
                                    <tr>
                                        <th>ID</th><th>项目名称</th><th>类型</th><th>状态</th><th>桩号</th><th>申请单位</th><th>审批日期</th><th>完工日期</th>
                                    </tr>
                                </thead>
                                <tbody id="stats-table-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 模态框 (Modal) 代码保持不变 ... -->
<div class="modal fade" id="detailModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="detailTitle">项目详情</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="detailBody"></div>
            <div class="modal-footer">
                <button type="button" class="btn btn-danger me-auto" onclick="app.deleteProject()">删除项目</button>
                <button type="button" class="btn btn-primary" onclick="app.editProject()">编辑项目</button>
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">关闭</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="imagePreviewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
        <div class="modal-content bg-transparent border-0">
            <div class="modal-header border-0">
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center p-0">
                <img id="previewImageFull" src="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7" class="img-fluid" style="max-height: 85vh; border-radius: 8px;">
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script type="module" src="js/main.js"></script>
</body>
</html>
